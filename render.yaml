services:
  - type: web
    name: comptaboard-pme
    runtime: python
    region: frankfurt
    plan: free

    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    startCommand: gunicorn --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT dashboard_comptable:server

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONUNBUFFERED
        value: "1"

    healthCheckPath: /health

    disk:
      name: comptaboard-data
      mountPath: /app/data
      sizeGB: 1
